trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - backend/**

pool:
  vmImage: ubuntu-latest

variables:
  buildConfiguration: Release
  dotnetVersion: '9.0.x'
  imageRepository: servicematch-api
  containerRegistry: servicematchacr.azurecr.io

stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildAndTest
        displayName: Build, Test & Publish
        steps:
          - task: UseDotNet@2
            displayName: Use .NET $(dotnetVersion)
            inputs:
              version: $(dotnetVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore packages
            inputs:
              command: restore
              projects: backend/ServiceMatch.sln

          - task: DotNetCoreCLI@2
            displayName: Build solution
            inputs:
              command: build
              projects: backend/ServiceMatch.sln
              arguments: --configuration $(buildConfiguration) --no-restore

          - task: DotNetCoreCLI@2
            displayName: Run unit tests
            inputs:
              command: test
              projects: |
                backend/tests/ServiceMatch.Domain.Tests/ServiceMatch.Domain.Tests.csproj
                backend/tests/ServiceMatch.Application.Tests/ServiceMatch.Application.Tests.csproj
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
                --collect:"XPlat Code Coverage"
                --results-directory $(Agent.TempDirectory)/coverage
              publishTestResults: true

          - task: PublishCodeCoverageResults@2
            displayName: Publish code coverage
            inputs:
              summaryFileLocation: $(Agent.TempDirectory)/coverage/**/coverage.cobertura.xml
              failIfCoverageEmpty: false

          - script: |
              dotnet tool install -g dotnet-reportgenerator-globaltool
              reportgenerator \
                "-reports:$(Agent.TempDirectory)/coverage/**/coverage.cobertura.xml" \
                "-targetdir:$(Agent.TempDirectory)/coverage/report" \
                "-reporttypes:Cobertura"
            displayName: Merge coverage reports

          - task: BuildQualityChecks@9
            displayName: Check coverage >= 80%
            inputs:
              checkCoverage: true
              coverageFailOption: fixed
              coverageType: lines
              coverageThreshold: 80

          - task: DotNetCoreCLI@2
            displayName: Run integration tests
            inputs:
              command: test
              projects: backend/tests/ServiceMatch.Integration.Tests/ServiceMatch.Integration.Tests.csproj
              arguments: >
                --configuration $(buildConfiguration)
                --no-build
              publishTestResults: true
            env:
              DOCKER_HOST: unix:///var/run/docker.sock

          - task: Docker@2
            displayName: Build API Docker image
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: backend/src/ServiceMatch.API/Dockerfile
              buildContext: backend
              tags: |
                $(Build.BuildId)
                latest

          - task: Docker@2
            displayName: Push API image to ACR
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            inputs:
              command: push
              repository: $(imageRepository)
              containerRegistry: $(containerRegistry)
              tags: |
                $(Build.BuildId)
                latest

          - task: PublishPipelineArtifact@1
            displayName: Publish image tag
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            inputs:
              targetPath: $(Build.ArtifactStagingDirectory)
              artifact: api-image-tag
              publishLocation: pipeline
