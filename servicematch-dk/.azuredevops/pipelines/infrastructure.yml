trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - infrastructure/**

pool:
  vmImage: ubuntu-latest

variables:
  terraformVersion: '1.7.5'
  backendResourceGroup: servicematch-tfstate-rg
  backendStorageAccount: servicematchtfstate
  backendContainer: tfstate

stages:
  - stage: Validate
    displayName: Terraform Validate & Plan (all envs)
    jobs:
      - job: ValidateDev
        displayName: Plan Dev
        variables:
          - group: servicematch-dev-secrets
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: terraform init (dev)
            inputs:
              provider: azurerm
              command: init
              workingDirectory: infrastructure
              backendServiceArm: servicematch-azure-connection
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: dev.terraform.tfstate

          - task: TerraformTaskV4@4
            displayName: terraform plan (dev)
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: infrastructure
              environmentServiceNameAzureRM: servicematch-azure-connection
              commandOptions: >
                -var-file=environments/dev.tfvars
                -var="postgresql_admin_password=$(POSTGRESQL_ADMIN_PASSWORD)"
                -var="jwt_secret=$(JWT_SECRET)"
                -out=dev.tfplan

          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: infrastructure/dev.tfplan
              artifact: dev-tfplan

      - job: ValidateTest
        displayName: Plan Test
        variables:
          - group: servicematch-test-secrets
        steps:
          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(terraformVersion)

          - task: TerraformTaskV4@4
            displayName: terraform init (test)
            inputs:
              provider: azurerm
              command: init
              workingDirectory: infrastructure
              backendServiceArm: servicematch-azure-connection
              backendAzureRmResourceGroupName: $(backendResourceGroup)
              backendAzureRmStorageAccountName: $(backendStorageAccount)
              backendAzureRmContainerName: $(backendContainer)
              backendAzureRmKey: test.terraform.tfstate

          - task: TerraformTaskV4@4
            displayName: terraform plan (test)
            inputs:
              provider: azurerm
              command: plan
              workingDirectory: infrastructure
              environmentServiceNameAzureRM: servicematch-azure-connection
              commandOptions: >
                -var-file=environments/test.tfvars
                -var="postgresql_admin_password=$(POSTGRESQL_ADMIN_PASSWORD)"
                -var="jwt_secret=$(JWT_SECRET)"

  - stage: ApplyDev
    displayName: Apply Dev
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: ApplyInfraDev
        displayName: Apply Terraform (dev)
        environment: dev
        variables:
          - group: servicematch-dev-secrets
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifact: dev-tfplan
                    path: infrastructure

                - task: TerraformTaskV4@4
                  displayName: terraform init (dev)
                  inputs:
                    provider: azurerm
                    command: init
                    workingDirectory: infrastructure
                    backendServiceArm: servicematch-azure-connection
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: dev.terraform.tfstate

                - task: TerraformTaskV4@4
                  displayName: terraform apply (dev)
                  inputs:
                    provider: azurerm
                    command: apply
                    workingDirectory: infrastructure
                    environmentServiceNameAzureRM: servicematch-azure-connection
                    commandOptions: dev.tfplan

  - stage: ApplyTest
    displayName: Apply Test
    dependsOn: ApplyDev
    condition: succeeded()
    jobs:
      - deployment: ApplyInfraTest
        displayName: Apply Terraform (test)
        environment: test
        variables:
          - group: servicematch-test-secrets
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: TerraformTaskV4@4
                  displayName: terraform init (test)
                  inputs:
                    provider: azurerm
                    command: init
                    workingDirectory: infrastructure
                    backendServiceArm: servicematch-azure-connection
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: test.terraform.tfstate

                - task: TerraformTaskV4@4
                  displayName: terraform apply (test)
                  inputs:
                    provider: azurerm
                    command: apply
                    workingDirectory: infrastructure
                    environmentServiceNameAzureRM: servicematch-azure-connection
                    commandOptions: >
                      -var-file=environments/test.tfvars
                      -var="postgresql_admin_password=$(POSTGRESQL_ADMIN_PASSWORD)"
                      -var="jwt_secret=$(JWT_SECRET)"
                      -auto-approve

  - stage: ApplyProd
    displayName: Apply Prod
    dependsOn: ApplyTest
    condition: succeeded()
    jobs:
      - deployment: ApplyInfraProd
        displayName: Apply Terraform (prod)
        environment: prod
        variables:
          - group: servicematch-prod-secrets
        strategy:
          runOnce:
            deploy:
              steps:
                - task: TerraformInstaller@1
                  inputs:
                    terraformVersion: $(terraformVersion)

                - task: TerraformTaskV4@4
                  displayName: terraform init (prod)
                  inputs:
                    provider: azurerm
                    command: init
                    workingDirectory: infrastructure
                    backendServiceArm: servicematch-azure-connection
                    backendAzureRmResourceGroupName: $(backendResourceGroup)
                    backendAzureRmStorageAccountName: $(backendStorageAccount)
                    backendAzureRmContainerName: $(backendContainer)
                    backendAzureRmKey: prod.terraform.tfstate

                - task: TerraformTaskV4@4
                  displayName: terraform apply (prod)
                  inputs:
                    provider: azurerm
                    command: apply
                    workingDirectory: infrastructure
                    environmentServiceNameAzureRM: servicematch-azure-connection
                    commandOptions: >
                      -var-file=environments/prod.tfvars
                      -var="postgresql_admin_password=$(POSTGRESQL_ADMIN_PASSWORD)"
                      -var="jwt_secret=$(JWT_SECRET)"
                      -auto-approve
