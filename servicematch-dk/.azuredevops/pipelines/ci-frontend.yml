trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - frontend/**

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '22.x'
  imageRepository: servicematch-frontend
  containerRegistry: servicematchacr.azurecr.io

stages:
  - stage: Build
    displayName: Build & Test
    jobs:
      - job: BuildAndTest
        displayName: Lint, Type-check, Build & Test
        steps:
          - task: NodeTool@0
            displayName: Use Node $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - script: npm ci
            displayName: Install dependencies
            workingDirectory: frontend

          - script: npm run lint
            displayName: Lint
            workingDirectory: frontend
            continueOnError: false

          - script: npx nuxi typecheck
            displayName: Type check
            workingDirectory: frontend
            continueOnError: false

          - script: npm run build
            displayName: Build Nuxt app
            workingDirectory: frontend
            env:
              NUXT_PUBLIC_API_BASE_URL: https://placeholder.example.com/api/v1

          - task: Docker@2
            displayName: Build frontend Docker image
            inputs:
              command: build
              repository: $(imageRepository)
              dockerfile: frontend/Dockerfile
              buildContext: frontend
              tags: |
                $(Build.BuildId)
                latest

          - task: Docker@2
            displayName: Push frontend image to ACR
            condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
            inputs:
              command: push
              repository: $(imageRepository)
              containerRegistry: $(containerRegistry)
              tags: |
                $(Build.BuildId)
                latest
