services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: servicematch
      POSTGRES_USER: servicematch
      POSTGRES_PASSWORD: servicematch_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U servicematch"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  api:
    build:
      context: ./backend
      dockerfile: src/ServiceMatch.API/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=servicematch;Username=servicematch;Password=servicematch_dev"
      Jwt__Secret: "dev-secret-min-32-chars-long-replace-in-prod"
      Jwt__Issuer: "servicematch-api"
      Jwt__Audience: "servicematch-clients"
      Email__Provider: "logging"
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NUXT_PUBLIC_API_BASE_URL: "http://localhost:5000/api/v1"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
